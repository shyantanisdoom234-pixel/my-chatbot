<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Chatbot</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    #chat-box { border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
    .msg { margin: 8px 0; }
    .user { text-align: right; color: #0070f3; }
    .bot { text-align: left; color: #333; }
    #input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 16px; background: #0070f3; color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>💬 My Chatbot</h2>
  <div id="chat-box"></div>
  <div id="input-row">
    <input id="user-input" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const API_URL = "http://localhost:8000/chat"; // Change to your deployed URL later
    let history = [];

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";

      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history })
      });

      const data = await res.json();
      history.push({ role: "user", content: message });
      history.push({ role: "assistant", content: data.reply });
      addMessage("bot", data.reply);
    }

    function addMessage(role, text) { 
      const box = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = (role === "user" ? "You: " : "Bot: ") + text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
